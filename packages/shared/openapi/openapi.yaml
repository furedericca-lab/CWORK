openapi: 3.1.0
info:
  title: CWORK API
  version: 0.1.0
  description: Contract-first API baseline for the AstrBot refactor.
servers:
  - url: /api/v1
paths:
  /healthz:
    get:
      summary: Service liveness check
      operationId: getHealthz
      responses:
        '200':
          description: Health state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthzResponse'
  /readyz:
    get:
      summary: Service readiness check
      operationId: getReadyz
      responses:
        '200':
          description: Readiness state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyzResponse'

  /runtime/sessions:
    get:
      summary: List runtime sessions
      operationId: listRuntimeSessions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: pageSize
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Runtime session list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RuntimeSessionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /runtime/chat:
    post:
      summary: Execute runtime chat request and stream results
      operationId: postRuntimeChat
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeChatRequest'
      responses:
        '200':
          description: Server-Sent Events stream
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /config/dify:
    get:
      summary: Get effective Dify config
      operationId: getDifyConfig
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Effective Dify config with masked api key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DifyConfigMaskedView'
    put:
      summary: Update Dify config
      operationId: putDifyConfig
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DifyConfig'
      responses:
        '200':
          description: Updated Dify config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DifyConfigMaskedView'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /subagents:
    get:
      summary: Get subagent config
      operationId: getSubagents
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Subagent config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubagentConfig'
    put:
      summary: Update subagent config
      operationId: putSubagents
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubagentConfig'
      responses:
        '200':
          description: Updated subagent config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubagentConfig'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /subagents/available-tools:
    get:
      summary: List available tools for subagents
      operationId: getSubagentAvailableTools
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Available tools
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubagentAvailableToolsResponse'

  /tools:
    get:
      summary: List tools
      operationId: listTools
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Tool list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'

  /tools/reload:
    post:
      summary: Reload built-in and dynamic tools
      operationId: postToolsReload
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reloaded tool list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolListResponse'

  /tools/{toolName}/enable:
    post:
      summary: Enable tool
      operationId: postToolEnable
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ToolNamePath'
      responses:
        '200':
          description: Updated tool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolItem'

  /tools/{toolName}/disable:
    post:
      summary: Disable tool
      operationId: postToolDisable
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ToolNamePath'
      responses:
        '200':
          description: Updated tool
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolItem'

  /tools/{toolName}:
    delete:
      summary: Delete tool
      operationId: deleteTool
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ToolNamePath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /tools/execute:
    post:
      summary: Execute tool
      operationId: postToolsExecute
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToolExecuteRequest'
      responses:
        '200':
          description: Execution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolExecuteResponse'

  /tools/mcp/servers:
    get:
      summary: List MCP servers
      operationId: listMcpServers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: MCP server list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerListResponse'

  /tools/mcp/add:
    post:
      summary: Add MCP server
      operationId: addMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerConfig'
      responses:
        '200':
          description: Added server config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerConfig'

  /tools/mcp/update:
    post:
      summary: Update MCP server
      operationId: updateMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerConfig'
      responses:
        '200':
          description: Updated server config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerConfig'

  /tools/mcp/delete:
    post:
      summary: Delete MCP server
      operationId: deleteMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerNameRequest'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /tools/mcp/test:
    post:
      summary: Test MCP server
      operationId: testMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerNameRequest'
      responses:
        '200':
          description: Test result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerTestResponse'

  /tools/mcp/enable:
    post:
      summary: Enable MCP server
      operationId: enableMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerNameRequest'
      responses:
        '200':
          description: Enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /tools/mcp/disable:
    post:
      summary: Disable MCP server
      operationId: disableMcpServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/McpServerNameRequest'
      responses:
        '200':
          description: Disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /capabilities/status:
    get:
      summary: Get capability status
      operationId: getCapabilitiesStatus
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Capability status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilityStatusResponse'

  /proactive/jobs:
    get:
      summary: List proactive jobs
      operationId: listProactiveJobs
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Proactive job list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProactiveJobListResponse'
    post:
      summary: Create proactive job
      operationId: createProactiveJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProactiveJobCreateRequest'
      responses:
        '200':
          description: Created proactive job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProactiveJob'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /proactive/jobs/{jobId}:
    delete:
      summary: Delete proactive job
      operationId: deleteProactiveJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobIdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /kb/documents:
    get:
      summary: List knowledge documents
      operationId: listKnowledgeDocuments
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Document list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocumentListResponse'
    post:
      summary: Create knowledge document and indexing task
      operationId: createKnowledgeDocument
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeDocumentCreateRequest'
      responses:
        '200':
          description: Created document and task
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeDocumentCreateResponse'

  /kb/tasks/{taskId}:
    get:
      summary: Get knowledge indexing task
      operationId: getKnowledgeTask
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskIdPath'
      responses:
        '200':
          description: Task status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeTaskStatus'

  /kb/retrieve:
    post:
      summary: Retrieve knowledge snippets
      operationId: retrieveKnowledge
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KnowledgeRetrieveRequest'
      responses:
        '200':
          description: Retrieval result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KnowledgeRetrieveResponse'

  /kb/documents/{docId}:
    delete:
      summary: Delete knowledge document
      operationId: deleteKnowledgeDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DocIdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /skills:
    get:
      summary: List skills and prompt block
      operationId: listSkills
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Skills with prompt block
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillListResponse'

  /skills/reload:
    post:
      summary: Reload skills
      operationId: reloadSkills
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Reloaded skills
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillReloadResponse'

  /skills/import:
    post:
      summary: Import skill from zip
      operationId: importSkill
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkillImportRequest'
      responses:
        '200':
          description: Imported skill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDescriptor'

  /skills/{skillId}/enable:
    post:
      summary: Enable skill
      operationId: enableSkill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillIdPath'
      responses:
        '200':
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDescriptor'

  /skills/{skillId}/disable:
    post:
      summary: Disable skill
      operationId: disableSkill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillIdPath'
      responses:
        '200':
          description: Updated skill
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDescriptor'

  /skills/{skillId}/download:
    get:
      summary: Get skill zip path
      operationId: getSkillDownloadPath
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillIdPath'
      responses:
        '200':
          description: Download path
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkillDownloadResponse'

  /skills/{skillId}:
    delete:
      summary: Delete skill
      operationId: deleteSkill
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/SkillIdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

  /plugins:
    get:
      summary: List plugins and status
      operationId: listPlugins
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Plugin list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginListResponse'

  /plugins/import/local:
    post:
      summary: Import plugin from local path
      operationId: importPluginLocal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginImportLocalRequest'
      responses:
        '200':
          description: Imported plugin info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginItem'

  /plugins/import/git:
    post:
      summary: Import plugin from git
      operationId: importPluginGit
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginImportGitRequest'
      responses:
        '200':
          description: Imported plugin info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginItem'

  /plugins/{pluginId}/enable:
    post:
      summary: Enable plugin
      operationId: enablePlugin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginIdPath'
      responses:
        '200':
          description: Updated plugin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginItem'

  /plugins/{pluginId}/disable:
    post:
      summary: Disable plugin
      operationId: disablePlugin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginIdPath'
      responses:
        '200':
          description: Updated plugin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginItem'

  /plugins/{pluginId}/reload:
    post:
      summary: Reload plugin
      operationId: reloadPlugin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginIdPath'
      responses:
        '200':
          description: Updated plugin
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginItem'

  /plugins/{pluginId}:
    delete:
      summary: Uninstall plugin
      operationId: deletePlugin
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginIdPath'
      responses:
        '200':
          description: Deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BooleanOkResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  parameters:
    ToolNamePath:
      in: path
      name: toolName
      required: true
      schema:
        type: string
    PluginIdPath:
      in: path
      name: pluginId
      required: true
      schema:
        type: string
    SkillIdPath:
      in: path
      name: skillId
      required: true
      schema:
        type: string
    JobIdPath:
      in: path
      name: jobId
      required: true
      schema:
        type: string
    DocIdPath:
      in: path
      name: docId
      required: true
      schema:
        type: string
    TaskIdPath:
      in: path
      name: taskId
      required: true
      schema:
        type: string

  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum:
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - CONFLICT
                - VALIDATION_ERROR
                - TIMEOUT
                - UPSTREAM_ERROR
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string

    BooleanOkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    HealthzResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          const: true

    ReadyzResponse:
      type: object
      required: [ok, provider]
      properties:
        ok:
          type: boolean
        provider:
          type: string
          enum: [dify]

    MessagePart:
      oneOf:
        - type: object
          required: [type, text]
          properties:
            type:
              type: string
              const: plain
            text:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              type: string
              const: image
            path:
              type: string
            url:
              type: string
            attachmentId:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              type: string
              const: file
            path:
              type: string
            url:
              type: string
            attachmentId:
              type: string
            filename:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              type: string
              const: video
            path:
              type: string
            url:
              type: string
            attachmentId:
              type: string
        - type: object
          required: [type]
          properties:
            type:
              type: string
              const: record
            path:
              type: string
            url:
              type: string
        - type: object
          required: [type, messageId]
          properties:
            type:
              type: string
              const: reply
            messageId:
              oneOf:
                - type: string
                - type: number

    RuntimeChatRequest:
      type: object
      required: [message]
      properties:
        sessionId:
          type: string
        message:
          oneOf:
            - type: string
            - type: array
              minItems: 1
              items:
                $ref: '#/components/schemas/MessagePart'
        enableStreaming:
          type: boolean
          default: true
        configId:
          type: string
        metadata:
          type: object
          additionalProperties: true

    RuntimeSessionItem:
      type: object
      required: [sessionId, displayName, createdAt, updatedAt]
      properties:
        sessionId:
          type: string
        displayName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RuntimeSessionsResponse:
      type: object
      required: [items, total, page, pageSize]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeSessionItem'
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    DifyConfig:
      type: object
      required:
        - providerId
        - difyApiBase
        - difyApiType
        - difyWorkflowOutputKey
        - difyQueryInputKey
        - timeoutSec
      properties:
        providerId:
          type: string
        difyApiKey:
          type: string
        difyApiBase:
          type: string
          format: uri
        difyApiType:
          type: string
          enum: [chat, agent, chatflow, workflow]
        difyWorkflowOutputKey:
          type: string
        difyQueryInputKey:
          type: string
        timeoutSec:
          type: integer
          minimum: 1
        variables:
          type: object
          additionalProperties: true

    DifyConfigMaskedView:
      allOf:
        - $ref: '#/components/schemas/DifyConfig'
        - type: object
          required: [masked]
          properties:
            masked:
              type: object
              required: [difyApiKey]
              properties:
                difyApiKey:
                  type: string

    PluginImportLocalRequest:
      type: object
      required: [path]
      properties:
        path:
          type: string

    PluginImportGitRequest:
      type: object
      required: [repoUrl]
      properties:
        repoUrl:
          type: string
        ref:
          type: string

    PluginItem:
      type: object
      required: [pluginId, name, version, source, status, error]
      properties:
        pluginId:
          type: string
        name:
          type: string
        version:
          type: string
        source:
          type: string
          enum: [local, git]
        status:
          type: string
          enum: [enabled, disabled, error]
        error:
          type: string
          nullable: true

    PluginListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginItem'

    ToolSchemaField:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [string, number, boolean, object, array]
        required:
          type: boolean
        description:
          type: string

    ToolItem:
      type: object
      required: [toolName, description, enabled, schema, source]
      properties:
        toolName:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        schema:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ToolSchemaField'
        source:
          type: string
          enum: [builtin, mcp, plugin]

    ToolListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ToolItem'

    ToolExecuteRequest:
      type: object
      required: [toolName, arguments]
      properties:
        toolName:
          type: string
        arguments:
          type: object
          additionalProperties: true
        sessionId:
          type: string

    ToolExecuteResponse:
      type: object
